{% extends 'base.html' %}
  
{% block content  %}
<section class="vh-100" style = "opacity: 0.8;">
  <div class="container py-5 h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col col-lg-4">
        <div class="card" style="border-radius: 1rem;">
          <div>
            
            <div class="col-lg-12 col-lg-7 d-flex align-items-center">
              <div class="card-body p-4 p-lg-5 text-black">

                <form action=/login/ method = "POST">

                   <div class="d-flex align-items-center ">
                    <i class="fas fa-cubes fa-2x me-3" style="color: #ff6219;"></i>
                    <span class="h1 fw-bold mx-auto">LOGIN</span>
                  </div>

                  <h5 class=" h5 mx-auto pb-3" style="letter-spacing: 1px;">Sign into your account</h5>

                  {% comment %} <div class="form-outline mb-4">
                    <input type="email" id="form2Example17" class="form-control form-control-lg" />
                    <label class="form-label" for="form2Example17">Email address</label>
                  </div>

                  <div class="form-outline mb-4">
                    <input type="password" id="form2Example27" class="form-control form-control-lg" />
                    <label class="form-label" for="form2Example27">Password</label>
                  </div> {% endcomment %}

                  {%csrf_token%}
                  {{form.as_p}}

                  <div class="pt-1 mb-4">
                    <input class="btn btn-dark btn-lg btn-block" type="submit">
                  </div> 

                  
                </form>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{%endblock%}
